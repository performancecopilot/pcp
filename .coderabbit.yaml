# .coderabbit.yaml
inheritance: true
reviews:

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - "main"

  pre_merge_checks:
    docstrings:
      mode: off
 
  path_instructions:

    # ── C/C++ ────────────────────────────────────────────────────
    # Skills: safe-c-functions, compiler-hardening
    - path: "**/*.{c,cpp,h,hpp}"
      instructions: |
        C/C++ security:
        - Banned: gets, sprintf, strcpy, strcat, strtok
        - Use pmfstring, pmsprintf, pmstrncpy, pmstrncat, pmstrlen, bounded APIs
        - Nullify pointers after free; no use-after-free
        - Integer overflow: check arithmetic on untrusted sizes
