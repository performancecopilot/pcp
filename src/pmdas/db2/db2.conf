[connection]
## Hostname or IP address of the Db2 server
hostname=localhost

## TCP port number for the Db2 instance (default 50000)
port=50000

## Connection timeout in seconds
timeout=5

[authentication]
## Db2 username and password
## These must be configured before use
#username=CHANGE_ME
#password=CHANGE_ME

[databases]
## Space-separated list of database names to monitor on the above instance
## All databases must be accessible with the same credentials above
#names=SAMPLE
