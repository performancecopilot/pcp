#
# PCP NIXL PMDA config file - see pmdanixl(1)
#

[nixl]
# User account under which to run the PMDA.  Should match the user that runs
# the NIXL application so that telemetry file permissions align automatically.
# user = root

# Directory scanned for NIXL agent shared-memory telemetry files.  Each NIXL
# application must export NIXL_TELEMETRY_ENABLE=1 and write its telemetry
# files here before the PMDA can discover them.
# telemetry_dir = /var/tmp
